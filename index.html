<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="筋トレ">
  <link rel="manifest" href="manifest.json">
  <meta name="color-scheme" content="light">
  <title>筋トレログ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      color-scheme: light only;
      --bg:     #F2F2F7;
      --card:   #FFFFFF;
      --blue:   #FF9500;
      --green:  #34C759;
      --red:    #FF3B30;
      --orange: #E67E00;
      --gray:   #8E8E93;
      --sep:    #C6C6C8;
      --label:  #000000;
      --label2: #3C3C43;
      --fill:   #F2F2F7;
      --st: env(safe-area-inset-top, 0px);
      --sb: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--label);
      min-height: 100vh;
      overflow: hidden;
    }

    .screen { display: none; position: fixed; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .screen.active { display: block; }

    /* HOME */
    .home-header { padding: calc(var(--st) + 20px) 20px 16px; background: var(--card); border-bottom: 1px solid var(--sep); }
    .home-title  { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
    .home-date   { font-size: 15px; color: var(--gray); margin-top: 2px; }

    .section-label { font-size: 13px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; padding: 20px 20px 8px; }

    .type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 0 16px; }
    .type-btn  { background: var(--card); border: none; border-radius: 14px; padding: 18px 6px; cursor: pointer; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: transform .1s; }
    .type-btn:active { transform: scale(.95); background: #E5E5EA; }
    .type-icon  { font-size: 30px; margin-bottom: 6px; }
    .type-label { font-size: 16px; font-weight: 700; }
    .type-sub   { font-size: 11px; color: var(--gray); margin-top: 2px; }

    .history-list  { padding: 0 16px; padding-bottom: calc(var(--sb) + 32px); }
    .history-card  { background: var(--card); border-radius: 12px; padding: 13px 16px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .history-top   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .history-badge { font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 20px; background: var(--blue); color: #fff; }
    .history-meta  { font-size: 13px; color: var(--gray); }
    .history-exs   { font-size: 14px; color: var(--label2); }
    .history-empty { text-align: center; color: var(--gray); font-size: 15px; padding: 32px 0; }

    /* WORKOUT */
    .workout-nav { position: sticky; top: 0; z-index: 100; background: rgba(242,242,247,.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: calc(var(--st) + 10px) 16px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--sep); }
    .nav-back    { background: none; border: none; font-size: 17px; color: var(--blue); cursor: pointer; padding: 4px 0; }
    .nav-center  { text-align: center; }
    .nav-title   { font-size: 17px; font-weight: 600; }
    .nav-elapsed { font-size: 12px; color: var(--gray); margin-top: 1px; }
    .btn-finish  { background: var(--blue); color: #fff; border: none; border-radius: 20px; padding: 7px 18px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-finish:active { opacity: .75; }

    .workout-body { padding: 14px 16px; padding-bottom: calc(var(--sb) + 110px); }

    .ex-card      { background: var(--card); border-radius: 14px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .ex-card-head { padding: 13px 16px 10px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--sep); }
    .ex-name      { font-size: 16px; font-weight: 600; }
    .ex-best-lbl  { font-size: 12px; color: var(--blue); font-weight: 600; max-width: 55%; text-align: right; }

    /* STEPPER */
    .set-row  { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-top: 1px solid var(--sep); }
    .set-num  { font-size: 14px; font-weight: 600; color: var(--gray); width: 24px; flex-shrink: 0; text-align: center; }
    .stepper  { display: flex; align-items: center; flex: 1; gap: 2px; }
    .step-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--sep); background: var(--fill); font-size: 20px; line-height: 1; color: var(--blue); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: transform .1s; user-select: none; -webkit-user-select: none; }
    .step-btn:active { transform: scale(.88); background: #D8D8DD; }
    .step-vwrap { flex: 1; text-align: center; cursor: pointer; padding: 2px 0; min-width: 0; }
    .step-val  { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; display: block; line-height: 1.3; }
    .step-val.dim { color: var(--gray); }
    .step-unit { font-size: 10px; color: var(--gray); display: block; line-height: 1; }
    .step-input { width: 58px; text-align: center; border: 1.5px solid var(--blue); border-radius: 6px; padding: 3px 2px; font-size: 16px; font-weight: 700; background: var(--card); outline: none; font-family: inherit; -webkit-appearance: none; display: block; margin: 0 auto; }

    .done-btn  { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--sep); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; transition: all .15s; }
    .done-btn.done { background: var(--green); border-color: var(--green); color: #fff; }
    .done-btn:active { transform: scale(.88); }

    .add-set-btn { width: 100%; padding: 12px; border: none; background: none; color: var(--blue); font-size: 15px; font-weight: 500; cursor: pointer; border-top: 1px solid var(--sep); display: flex; align-items: center; justify-content: center; gap: 4px; }
    .add-ex-btn  { width: 100%; padding: 16px; background: var(--card); border: none; border-radius: 14px; color: var(--blue); font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.07); display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* TIMER RING */
    .timer-bar       { position: fixed; bottom: 0; left: 0; right: 0; padding: 8px 24px calc(var(--sb) + 8px); background: rgba(242,242,247,.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--sep); display: flex; align-items: center; justify-content: center; gap: 24px; }
    .timer-ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .timer-ring-wrap svg { position: absolute; inset: 0; width: 72px; height: 72px; }
    #ring-prog { transition: stroke-dashoffset 0.9s linear, stroke 0.3s; }
    .timer-val-center { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; position: relative; z-index: 1; }
    .timer-val-center.on  { color: var(--blue); }
    .timer-val-center.hot { color: var(--red); }
    .timer-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--blue); border: none; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .1s; }
    .timer-btn:active { transform: scale(.91); }
    .timer-btn.on { background: var(--orange); }

    /* PICKER */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; display: none; align-items: flex-end; }
    .overlay.open { display: flex; }
    .sheet        { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-height: 68vh; overflow-y: auto; padding-bottom: calc(var(--sb) + 16px); }
    .sheet-handle { width: 36px; height: 4px; background: var(--sep); border-radius: 2px; margin: 10px auto 4px; }
    .sheet-title  { font-size: 17px; font-weight: 600; text-align: center; padding: 4px 16px 14px; }
    .picker-group      { font-size: 13px; font-weight: 600; color: var(--gray); padding: 6px 20px 4px; }
    .picker-group-list { background: var(--card); border-radius: 12px; margin: 0 12px 10px; overflow: hidden; }
    .picker-item  { padding: 14px 18px; font-size: 16px; border-bottom: 1px solid var(--sep); cursor: pointer; }
    .picker-item:last-child { border-bottom: none; }
    .picker-item:active { background: var(--fill); }

    /* SUMMARY */
    .summary-hero  { padding: calc(var(--st) + 28px) 20px 20px; text-align: center; }
    .summary-emoji { font-size: 60px; margin-bottom: 8px; }
    .summary-ttl   { font-size: 28px; font-weight: 700; }
    .summary-meta  { font-size: 15px; color: var(--gray); margin-top: 4px; }
    .summary-body  { padding: 0 16px; padding-bottom: calc(var(--sb) + 28px); }

    .sum-card    { background: var(--card); border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .sum-ex-name { font-size: 15px; font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--sep); }
    .sum-row     { display: flex; align-items: center; padding: 10px 16px; gap: 10px; border-top: 1px solid var(--sep); }
    .sum-set-num  { font-size: 14px; color: var(--gray); width: 44px; flex-shrink: 0; }
    .sum-set-data { font-size: 15px; font-weight: 500; }
    .sum-pr       { font-size: 12px; font-weight: 700; color: #fff; background: var(--blue); padding: 2px 8px; border-radius: 10px; margin-left: auto; flex-shrink: 0; }
    .sum-prev     { font-size: 13px; color: var(--gray); margin-left: auto; flex-shrink: 0; }
    .sum-prev.up  { color: var(--green); font-weight: 600; }

    .copy-banner { background: #F0FAF0; border: 1px solid #A8D5A8; border-radius: 12px; padding: 14px 18px; margin-bottom: 12px; text-align: center; font-size: 14px; font-weight: 600; color: #2A7A2A; }
    .copy-fail   { background: var(--card); border: 1px solid var(--sep); border-radius: 12px; padding: 12px 18px; margin-bottom: 10px; text-align: center; font-size: 13px; color: var(--gray); }
    .btn-export  { width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none; border-radius: 13px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
    .btn-export:active { opacity: .78; }
    .btn-to-home { width: 100%; padding: 16px; background: var(--card); color: var(--blue); border: none; border-radius: 13px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .btn-to-home:active { background: var(--fill); }

    /* TOAST */
    .toast { position: fixed; bottom: calc(var(--sb) + 90px); left: 50%; transform: translateX(-50%) translateY(16px); background: rgba(40,40,40,.88); color: #fff; padding: 10px 22px; border-radius: 22px; font-size: 14px; opacity: 0; transition: all .28s; pointer-events: none; white-space: nowrap; z-index: 400; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <div class="home-title">筋トレ</div>
      <div style="font-size:11px;color:var(--sep);">v1.0.7</div>
    </div>
    <div id="home-date" class="home-date"></div>
  </div>
  <div class="section-label">今日のワークアウト</div>
  <div class="type-grid">
    <button class="type-btn" onclick="startWorkout('Push')">
      <div class="type-icon">💪</div>
      <div class="type-label">Push</div>
      <div class="type-sub">胸・肩・三頭</div>
    </button>
    <button class="type-btn" onclick="startWorkout('Pull')">
      <div class="type-icon">🏋️</div>
      <div class="type-label">Pull</div>
      <div class="type-sub">背中・二頭</div>
    </button>
    <button class="type-btn" onclick="startWorkout('Legs')">
      <div class="type-icon">🦵</div>
      <div class="type-label">Legs</div>
      <div class="type-sub">脚・臀部</div>
    </button>
  </div>
  <div class="section-label">最近の記録</div>
  <div id="history-list" class="history-list"></div>
</div>

<!-- WORKOUT -->
<div id="screen-workout" class="screen">
  <div class="workout-nav">
    <button class="nav-back" onclick="confirmBack()">‹ 戻る</button>
    <div class="nav-center">
      <div id="nav-type" class="nav-title"></div>
      <div id="nav-elapsed" class="nav-elapsed">0:00</div>
    </div>
    <button class="btn-finish" onclick="finishWorkout()">終了</button>
  </div>
  <div id="workout-body" class="workout-body"></div>
  <div class="timer-bar">
    <div class="timer-ring-wrap">
      <svg viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="30" fill="none" stroke="#C6C6C8" stroke-width="5"/>
        <circle id="ring-prog" cx="36" cy="36" r="30" fill="none" stroke="#C6C6C8" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="0"
          transform="rotate(-90 36 36)"/>
      </svg>
      <span id="timer-val" class="timer-val-center">1:00</span>
    </div>
    <button id="timer-btn" class="timer-btn" onclick="toggleTimer()">▶</button>
  </div>
</div>

<!-- SUMMARY -->
<div id="screen-summary" class="screen">
  <div class="summary-hero">
    <div class="summary-emoji">🏆</div>
    <div class="summary-ttl">完了！</div>
    <div id="summary-meta" class="summary-meta"></div>
  </div>
  <div id="summary-body" class="summary-body"></div>
</div>

<!-- Picker -->
<div id="overlay" class="overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">種目を追加</div>
    <div id="picker-list"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const EXERCISES = {
  Push: ['ベンチプレス','インクラインダンベルプレス','ショルダープレス','サイドレイズ','ケーブルプッシュダウン'],
  Pull: ['ラットプルダウン','チンアップ','ベントオーバーローイング','シーテッドロウ','フェイスプル','バーベルカール'],
  Legs: ['スクワット','レッグプレス','ルーマニアンデッドリフト','レッグカール','カーフレイズ']
};

const RING_CIRC = 188.5;

var session     = null;
var wkHistory   = [];
var elapsedTick = null;
var tmr = { running: false, remaining: 60, base: 60, tick: null };

// ── DOM ヘルパー ──────────────────────────────────────────────────────────────

function h(tag, props) {
  var el = document.createElement(tag);
  if (props) {
    Object.entries(props).forEach(function(entry) {
      var k = entry[0], v = entry[1];
      if (k === 'cls')       { el.className = v; }
      else if (k === 'txt')  { el.textContent = v; }
      else if (k === 'val')  { el.value = v; }
      else if (k[0] === '$') { el.addEventListener(k.slice(1), v); }
      else                   { el.setAttribute(k, v); }
    });
  }
  return el;
}

function append(parent) {
  Array.prototype.slice.call(arguments, 1).forEach(function(c) {
    if (c != null) parent.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return parent;
}

function clearEl(id) {
  var el = document.getElementById(id);
  while (el.firstChild) el.removeChild(el.firstChild);
  return el;
}

// ── 起動 ──────────────────────────────────────────────────────────────────────

function init() {
  try { var ph = JSON.parse(localStorage.getItem('muscle_history') || '[]'); wkHistory = Array.isArray(ph) ? ph : []; } catch(e) { wkHistory = []; }
  try { var d = localStorage.getItem('muscle_draft'); if (d) session = JSON.parse(d); } catch(e) {}
  renderHome();
  updateTimerUI();
}

// ── ホーム ────────────────────────────────────────────────────────────────────

function renderHome() {
  var d = new Date();
  var w = ['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('home-date').textContent =
    d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + w + '）';

  var list = clearEl('history-list');
  if (!wkHistory.length) {
    list.appendChild(h('div', {cls: 'history-empty', txt: 'まだ記録がありません'}));
    return;
  }
  wkHistory.slice(0, 6).forEach(function(s) {
    var exNames = s.exercises.map(function(e) { return e.name; }).join(' · ');
    var dur = s.duration ? ' · ' + fmtDur(s.duration) : '';
    var card = h('div', {cls: 'history-card'});
    var top  = h('div', {cls: 'history-top'});
    append(top,
      h('span', {cls: 'history-badge', txt: s.type}),
      h('span', {cls: 'history-meta',  txt: s.date + dur})
    );
    append(card, top, h('div', {cls: 'history-exs', txt: exNames}));
    card.style.cursor = 'pointer';
    card.addEventListener('click', (function(sess) { return function() { showHistoryDetail(sess); }; })(s));
    list.appendChild(card);
  });
}

// ── ワークアウト ──────────────────────────────────────────────────────────────

function startWorkout(type) {
  if (!session || session.type !== type || session.duration) {
    session = { date: today(), type: type, startTime: Date.now(), exercises: [] };
    addExercise(EXERCISES[type][0]);
  }
  document.getElementById('nav-type').textContent = type;
  showScreen('workout');
  startElapsed();
  renderWorkout();
}

function renderWorkout() {
  saveDraft();
  var body = clearEl('workout-body');
  if (!session || !Array.isArray(session.exercises)) {
    body.appendChild(h('div', {cls: 'history-empty', txt: 'session error: ' + JSON.stringify(session).slice(0,80)}));
    return;
  }
  try {
    session.exercises.forEach(function(ex, ei) {
      body.appendChild(buildExCard(ex, ei));
    });
  } catch(err) {
    body.appendChild(h('div', {cls: 'history-empty', txt: 'render error: ' + err.message}));
  }
  body.appendChild(h('button', {cls: 'add-ex-btn', txt: '＋ 種目を追加', $click: openPicker}));
}

function buildExCard(ex, ei) {
  var best    = bestRecord(ex.name);
  var bestTxt = (best && best.weight > 0) ? 'ベスト ' + best.weight + 'kg × ' + best.reps + '回' : '';

  var card     = h('div', {cls: 'ex-card'});
  var cardHead = h('div', {cls: 'ex-card-head'});
  append(cardHead,
    h('span', {cls: 'ex-name',     txt: ex.name}),
    h('span', {cls: 'ex-best-lbl', txt: bestTxt})
  );

  var setsBody = h('div', {cls: 'sets-body'});
  ex.sets.forEach(function(s, si) {
    setsBody.appendChild(buildSetRow(s, ei, si));
  });

  var addSetBtn = h('button', {cls: 'add-set-btn', txt: '＋ セット'});
  addSetBtn.addEventListener('click', (function(i) { return function() { addSet(i); }; })(ei));

  append(card, cardHead, setsBody, addSetBtn);
  return card;
}

// ── ステッパー ────────────────────────────────────────────────────────────────

function buildStepper(initVal, step, unit, min, max, onChange) {
  var val   = typeof initVal === 'number' ? initVal : 0;
  var wrap  = h('div', {cls: 'stepper'});
  var minus = h('button', {cls: 'step-btn', type: 'button', txt: '−'});
  var plus  = h('button', {cls: 'step-btn', type: 'button', txt: '＋'});
  var vwrap = h('div', {cls: 'step-vwrap'});
  var valEl = h('span', {cls: val > 0 ? 'step-val' : 'step-val dim', txt: String(val)});
  var unitEl = h('span', {cls: 'step-unit', txt: unit});
  append(vwrap, valEl, unitEl);

  function setVal(v) {
    val = parseFloat(Math.max(min, Math.min(max, v)).toFixed(1));
    valEl.textContent = String(val);
    valEl.className   = val > 0 ? 'step-val' : 'step-val dim';
    onChange(val);
  }

  // desktop: click fires normally
  minus.addEventListener('click', function() { setVal(val - step); });
  plus.addEventListener('click',  function() { setVal(val + step); });

  // iOS/touch: preventDefault kills click, so fire fn immediately on touchstart
  var holdTO = null, holdIV = null;
  function startHold(fn) {
    fn();
    holdTO = setTimeout(function() { holdIV = setInterval(fn, 160); }, 400);
  }
  function stopHold() { clearTimeout(holdTO); clearInterval(holdIV); holdTO = holdIV = null; }

  minus.addEventListener('touchstart',  function(e) { e.preventDefault(); startHold(function() { setVal(val - step); }); }, {passive: false});
  minus.addEventListener('touchend',    stopHold);
  minus.addEventListener('touchcancel', stopHold);
  plus.addEventListener('touchstart',   function(e) { e.preventDefault(); startHold(function() { setVal(val + step); }); }, {passive: false});
  plus.addEventListener('touchend',     stopHold);
  plus.addEventListener('touchcancel',  stopHold);

  vwrap.addEventListener('click', function() {
    if (vwrap.querySelector('.step-input')) return;
    var inp = h('input', {
      cls: 'step-input', type: 'number',
      inputmode: unit === 'kg' ? 'decimal' : 'numeric',
      min: String(min), step: String(step)
    });
    inp.value = val > 0 ? String(val) : '';
    vwrap.replaceChild(inp, valEl);
    vwrap.removeChild(unitEl);
    inp.focus(); inp.select();
    function commit() {
      var v = parseFloat(inp.value);
      if (!isNaN(v)) setVal(v);
      if (vwrap.contains(inp)) { vwrap.replaceChild(valEl, inp); vwrap.appendChild(unitEl); }
    }
    inp.addEventListener('blur',    commit);
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') inp.blur(); });
  });

  append(wrap, minus, vwrap, plus);
  return wrap;
}

function buildSetRow(s, ei, si) {
  var wVal = parseFloat(s.weight) || 0;
  var rVal = parseInt(s.reps)     || 0;

  var wStep = buildStepper(wVal, 2.5, 'kg',  0, 300,
    (function(i,j){ return function(v){ upd(i,j,'weight',v); }; })(ei,si));
  var rStep = buildStepper(rVal, 1,   'rep', 0,  99,
    (function(i,j){ return function(v){ upd(i,j,'reps',v); }; })(ei,si));

  var doneBtn = h('button', {cls: s.done ? 'done-btn done' : 'done-btn', txt: '✓'});
  doneBtn.addEventListener('click', (function(i,j){
    return function() { toggleDone(i,j); };
  })(ei,si));

  var row = h('div', {cls: 'set-row'});
  append(row, h('span', {cls: 'set-num', txt: String(si+1)}), wStep, rStep, doneBtn);
  return row;
}

function upd(ei, si, field, val) {
  session.exercises[ei].sets[si][field] = parseFloat(val) || 0;
  saveDraft();
}

function toggleDone(ei, si) {
  session.exercises[ei].sets[si].done = !session.exercises[ei].sets[si].done;
  if (session.exercises[ei].sets[si].done) startTimer();
  renderWorkout();
}

function addSet(ei) {
  var sets = session.exercises[ei].sets;
  var last = sets[sets.length - 1] || {};
  sets.push({ weight: last.weight || 0, reps: last.reps || 10, done: false });
  renderWorkout();
}

function addExercise(name) {
  if (session.exercises.some(function(e) { return e.name === name; })) {
    showToast(name + ' は追加済みです'); return;
  }
  var def = lastUsedFor(name);
  session.exercises.push({ name: name, sets: [{ weight: def.weight, reps: def.reps, done: false }] });
  renderWorkout();
}

// ── デフォルト値（前回セッション） ────────────────────────────────────────────

function lastUsedFor(name) {
  for (var i = 0; i < wkHistory.length; i++) {
    var sess = wkHistory[i];
    if (!sess || !sess.exercises) continue;
    for (var j = 0; j < sess.exercises.length; j++) {
      var ex = sess.exercises[j];
      if (ex.name === name && ex.sets && ex.sets.length > 0) {
        return { weight: parseFloat(ex.sets[0].weight) || 0, reps: parseInt(ex.sets[0].reps) || 10 };
      }
    }
  }
  return { weight: 0, reps: 10 };
}

// ── ベスト記録 ────────────────────────────────────────────────────────────────

function bestRecord(name) {
  var best = null;
  wkHistory.forEach(function(sess) {
    if (!sess || !sess.exercises) return;
    sess.exercises.forEach(function(ex) {
      if (ex.name !== name) return;
      ex.sets.forEach(function(s) {
        var w = parseFloat(s.weight) || 0;
        var r = parseInt(s.reps)     || 0;
        if (!best || w > best.weight || (w === best.weight && r > best.reps)) {
          best = { weight: w, reps: r };
        }
      });
    });
  });
  return best;
}

function checkPR(name, weight, reps, prevHistory) {
  var w = parseFloat(weight) || 0;
  var r = parseInt(reps)     || 0;
  if (w === 0) return false;
  var best = null;
  prevHistory.forEach(function(sess) {
    if (!sess || !sess.exercises) return;
    sess.exercises.forEach(function(ex) {
      if (ex.name !== name) return;
      ex.sets.forEach(function(s) {
        var sw = parseFloat(s.weight) || 0;
        var sr = parseInt(s.reps)     || 0;
        if (!best || sw > best.weight || (sw === best.weight && sr > best.reps)) {
          best = { weight: sw, reps: sr };
        }
      });
    });
  });
  if (!best) return true;
  return w > best.weight || (w === best.weight && r > best.reps);
}

// ── 終了・一括保存 ────────────────────────────────────────────────────────────

function finishWorkout() {
  var hasData = session.exercises.some(function(e) {
    return e.sets.some(function(s) {
      return (parseFloat(s.weight)||0) > 0 || (parseInt(s.reps)||0) > 0;
    });
  });
  if (!hasData) { showToast('データを入力してください'); return; }

  clearInterval(elapsedTick);
  clearInterval(tmr.tick);
  tmr.running = false;

  var done = {
    date: session.date, type: session.type,
    duration: Math.floor((Date.now() - session.startTime) / 1000),
    exercises: session.exercises.map(function(ex) {
      return {
        name: ex.name,
        sets: ex.sets
          .filter(function(s) { return (parseFloat(s.weight)||0) > 0 || (parseInt(s.reps)||0) > 0; })
          .map(function(s)    { return { weight: s.weight, reps: s.reps }; })
      };
    }).filter(function(ex) { return ex.sets.length > 0; })
  };

  wkHistory.unshift(done);
  if (wkHistory.length > 200) wkHistory = wkHistory.slice(0, 200);
  localStorage.setItem('muscle_history', JSON.stringify(wkHistory));
  localStorage.removeItem('muscle_draft');
  session = done;

  var json = JSON.stringify(done, null, 2);

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json)
      .then(function()  { renderSummary(true);  showScreen('summary'); })
      .catch(function() { renderSummary(false); showScreen('summary'); });
  } else {
    var ok = false;
    try {
      var t = document.createElement('textarea');
      t.value = json; document.body.appendChild(t); t.select();
      document.execCommand('copy'); document.body.removeChild(t);
      ok = true;
    } catch(e) {}
    renderSummary(ok);
    showScreen('summary');
  }
}

function confirmBack() {
  var dirty = session && session.exercises &&
    session.exercises.some(function(e) {
      return e.sets.some(function(s) {
        return (parseFloat(s.weight)||0) > 0 || (parseInt(s.reps)||0) > 0;
      });
    });
  if (dirty && !confirm('ワークアウトを中断しますか？\nデータは一時保存されます。')) return;
  clearInterval(elapsedTick);
  showScreen('home');
  renderHome();
}

// ── タイマー ──────────────────────────────────────────────────────────────────

function toggleTimer() {
  if (tmr.running) { clearInterval(tmr.tick); tmr.running = false; updateTimerUI(); }
  else { startTimer(); }
}

function startTimer() {
  clearInterval(tmr.tick);
  tmr.remaining = tmr.base;
  tmr.running   = true;
  updateTimerUI();
  tmr.tick = setInterval(function() {
    tmr.remaining--;
    updateTimerUI();
    if (tmr.remaining <= 0) {
      clearInterval(tmr.tick);
      tmr.running = false;
      updateTimerUI();
    }
  }, 1000);
}

function updateTimerUI() {
  var v  = document.getElementById('timer-val');
  var b  = document.getElementById('timer-btn');
  var rp = document.getElementById('ring-prog');
  if (!v) return;

  var m = Math.floor(tmr.remaining / 60);
  var s = tmr.remaining % 60;
  v.textContent = m + ':' + (s < 10 ? '0' : '') + s;

  var hot = tmr.running && tmr.remaining <= 10;
  v.className = 'timer-val-center' + (tmr.running ? (hot ? ' hot' : ' on') : '');

  if (rp) {
    var pct = Math.max(0, tmr.remaining / tmr.base);
    rp.style.strokeDashoffset = String((1 - pct) * RING_CIRC);
    rp.setAttribute('stroke', tmr.running ? (hot ? '#FF3B30' : '#FF9500') : '#C6C6C8');
  }
  if (b) {
    b.textContent = tmr.running ? '⏸' : '▶';
    b.className   = 'timer-btn' + (tmr.running ? ' on' : '');
  }
}

function startElapsed() {
  clearInterval(elapsedTick);
  elapsedTick = setInterval(function() {
    if (!session) return;
    var el = document.getElementById('nav-elapsed');
    if (el) el.textContent = fmtDur(Math.floor((Date.now() - session.startTime) / 1000));
  }, 1000);
}

// ── ピッカー ──────────────────────────────────────────────────────────────────

function showHistoryDetail(sess) {
  document.querySelector('#overlay .sheet-title').textContent =
    sess.type + ' · ' + sess.date + (sess.duration ? ' · ' + fmtDur(sess.duration) : '');
  var list = clearEl('picker-list');
  (sess.exercises || []).forEach(function(ex) {
    if (!ex.sets || !ex.sets.length) return;
    list.appendChild(h('div', {cls: 'picker-group', txt: ex.name}));
    var gl = h('div', {cls: 'picker-group-list'});
    ex.sets.forEach(function(s, si) {
      gl.appendChild(h('div', {cls: 'picker-item',
        txt: 'Set ' + (si + 1) + '　' + (s.weight || '—') + ' kg × ' + (s.reps || '—') + ' 回'}));
    });
    list.appendChild(gl);
  });
  document.getElementById('overlay').classList.add('open');
}

function openPicker() {
  document.querySelector('#overlay .sheet-title').textContent = '種目を追加';
  var list = clearEl('picker-list');
  Object.entries(EXERCISES).forEach(function(entry) {
    var group = entry[0], exs = entry[1];
    list.appendChild(h('div', {cls: 'picker-group', txt: group}));
    var groupList = h('div', {cls: 'picker-group-list'});
    exs.forEach(function(name) {
      var item = h('div', {cls: 'picker-item', txt: name});
      item.addEventListener('click', (function(n) {
        return function() { addExercise(n); closePicker(); };
      })(name));
      groupList.appendChild(item);
    });
    list.appendChild(groupList);
  });
  document.getElementById('overlay').classList.add('open');
}

function closePicker()   { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target.id === 'overlay') closePicker(); }

// ── サマリー ──────────────────────────────────────────────────────────────────

function renderSummary(copied) {
  var total = session.exercises.reduce(function(n, e) { return n + e.sets.length; }, 0);
  document.getElementById('summary-meta').textContent =
    session.date + '　' + session.type + '　' + fmtDur(session.duration || 0) + '　' + total + 'セット';

  var prevSess    = wkHistory.find(function(s) { return s.type === session.type && s.date !== session.date; });
  var prevHistory = wkHistory.slice(1);

  var body = clearEl('summary-body');

  if (copied) {
    var banner = h('div', {cls: 'copy-banner', txt: '✓ クリップボードにコピー済み — ショートカットを実行してください'});
    body.appendChild(banner);
  } else {
    body.appendChild(h('div', {cls: 'copy-fail', txt: 'コピーに失敗しました'}));
    var expBtn = h('button', {cls: 'btn-export', txt: '📋 JSONを手動コピー'});
    expBtn.addEventListener('click', exportJSON);
    body.appendChild(expBtn);
  }

  session.exercises.forEach(function(ex) {
    var pex  = prevSess ? prevSess.exercises.find(function(e) { return e.name === ex.name; }) : null;
    var card = h('div', {cls: 'sum-card'});
    card.appendChild(h('div', {cls: 'sum-ex-name', txt: ex.name}));

    ex.sets.forEach(function(s, si) {
      var ps  = pex ? pex.sets[si] : null;
      var up  = ps && (parseFloat(s.weight) > parseFloat(ps.weight) ||
                (String(s.weight) === String(ps.weight) && parseInt(s.reps) > parseInt(ps.reps)));
      var pr  = checkPR(ex.name, s.weight, s.reps, prevHistory);
      var row = h('div', {cls: 'sum-row'});
      append(row,
        h('span', {cls: 'sum-set-num',  txt: 'Set ' + (si+1)}),
        h('span', {cls: 'sum-set-data', txt: (s.weight||'—') + ' kg × ' + (s.reps||'—') + ' 回'})
      );
      if (pr) {
        row.appendChild(h('span', {cls: 'sum-pr', txt: '🏆 PR'}));
      } else if (ps) {
        row.appendChild(h('span', {
          cls: 'sum-prev' + (up ? ' up' : ''),
          txt: (up ? '↑ ' : '') + '前回 ' + (ps.weight||'—') + '×' + (ps.reps||'—')
        }));
      }
      card.appendChild(row);
    });
    body.appendChild(card);
  });

  var homeBtn = h('button', {cls: 'btn-to-home', txt: 'ホームへ'});
  homeBtn.addEventListener('click', goHome);
  body.appendChild(homeBtn);
}

function exportJSON() {
  var json = JSON.stringify(session, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(function() { showToast('コピーしました ✓'); });
  } else {
    var t = document.createElement('textarea');
    t.value = json; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    showToast('コピーしました ✓');
  }
}

function goHome() { session = null; showScreen('home'); renderHome(); }

// ── ユーティリティ ────────────────────────────────────────────────────────────

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function saveDraft() {
  if (session && !session.duration)
    localStorage.setItem('muscle_draft', JSON.stringify(session));
}

function today() { return new Date().toISOString().split('T')[0]; }

function fmtDur(sec) {
  var hh = Math.floor(sec / 3600);
  var mm = Math.floor((sec % 3600) / 60);
  var ss = sec % 60;
  if (hh) return hh + '時間' + mm + '分';
  if (mm) return mm + '分' + ss + '秒';
  return ss + '秒';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

init();
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
